[comparison]
name = "dual_market_reference_comparison_2023_2025"
duckdb_path = "data/artifacts/jrdb_2023_2025_supported_full.duckdb"
output_dir = "data/artifacts/dual_market_reference_comparison_2023_2025"
start_date = "2023-01-01"
end_date = "2025-12-31"
target_name = "is_place"
backtest_template_config_path = "configs/place_backtest_edge_oz_place_basis_dual_market_robustness_2023_2025.toml"
aggregate_selection_score_rule = "positive_window_count_then_mean_roi_then_min_roi"

[[comparison.feature_sets]]
name = "dual_market_logreg"
dataset_feature_set = "dual_market"
model_name = "logistic_regression"
feature_columns = ["win_odds", "place_basis_odds", "popularity"]
feature_transforms = ["log1p", "log1p", "identity"]
