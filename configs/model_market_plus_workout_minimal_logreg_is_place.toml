[training]
name = "market_plus_workout_minimal_logreg_is_place"
dataset_path = "data/processed/horse_dataset_market_plus_workout_minimal_is_place.parquet"
model_name = "logistic_regression"
feature_columns = ["win_odds", "popularity", "workout_gap_days", "workout_weekday_code"]
feature_transforms = ["log1p", "identity", "identity", "identity"]
target_column = "target_value"
split_column = "split"
output_dir = "data/artifacts/market_plus_workout_minimal_logreg_is_place"
max_iter = 1000
