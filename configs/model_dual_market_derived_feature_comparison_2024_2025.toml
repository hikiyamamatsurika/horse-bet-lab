[comparison]
name = "dual_market_derived_feature_comparison_2024_2025"
duckdb_path = "data/artifacts/jrdb_2024_2025.duckdb"
output_dir = "data/artifacts/dual_market_derived_feature_comparison_2024_2025"
start_date = "2024-01-01"
end_date = "2025-12-31"
target_name = "is_place"
backtest_template_config_path = "configs/place_backtest_edge_oz_place_basis_dual_market_robustness_2024_2025.toml"
aggregate_selection_score_rule = "positive_window_count_then_mean_roi_then_min_roi"

[[comparison.feature_sets]]
name = "dual_market"
dataset_feature_set = "dual_market"
feature_columns = ["win_odds", "place_basis_odds", "popularity"]
feature_transforms = ["log1p", "log1p", "identity"]

[[comparison.feature_sets]]
name = "dual_market_plus_log_diff"
dataset_feature_set = "dual_market_plus_log_diff"
feature_columns = ["win_odds", "place_basis_odds", "popularity", "log_place_minus_log_win"]
feature_transforms = ["log1p", "log1p", "identity", "identity"]

[[comparison.feature_sets]]
name = "dual_market_plus_implied_probs"
dataset_feature_set = "dual_market_plus_implied_probs"
feature_columns = [
  "win_odds",
  "place_basis_odds",
  "popularity",
  "implied_place_prob",
  "implied_win_prob",
]
feature_transforms = ["log1p", "log1p", "identity", "identity", "identity"]

[[comparison.feature_sets]]
name = "dual_market_plus_prob_diff"
dataset_feature_set = "dual_market_plus_prob_diff"
feature_columns = [
  "win_odds",
  "place_basis_odds",
  "popularity",
  "implied_place_prob_minus_implied_win_prob",
]
feature_transforms = ["log1p", "log1p", "identity", "identity"]

[[comparison.feature_sets]]
name = "dual_market_plus_ratio"
dataset_feature_set = "dual_market_plus_ratio"
feature_columns = ["win_odds", "place_basis_odds", "popularity", "place_to_win_ratio"]
feature_transforms = ["log1p", "log1p", "identity", "identity"]
