[comparison]
name = "dual_market_small_market_feature_comparison_2024_2025"
duckdb_path = "data/artifacts/jrdb_2024_2025.duckdb"
output_dir = "data/artifacts/dual_market_small_market_feature_comparison_2024_2025"
start_date = "2024-01-01"
end_date = "2025-12-31"
target_name = "is_place"
backtest_template_config_path = "configs/place_backtest_edge_oz_place_basis_dual_market_robustness_2024_2025.toml"
aggregate_selection_score_rule = "positive_window_count_then_mean_roi_then_min_roi"

[[comparison.feature_sets]]
name = "dual_market_logreg"
dataset_feature_set = "dual_market"
model_name = "logistic_regression"
feature_columns = ["win_odds", "place_basis_odds", "popularity"]
feature_transforms = ["log1p", "log1p", "identity"]

[[comparison.feature_sets]]
name = "dual_market_plus_headcount_logreg"
dataset_feature_set = "dual_market_plus_headcount"
model_name = "logistic_regression"
feature_columns = ["win_odds", "place_basis_odds", "popularity", "headcount"]
feature_transforms = ["log1p", "log1p", "identity", "identity"]

[[comparison.feature_sets]]
name = "dual_market_plus_headcount_place_slots_logreg"
dataset_feature_set = "dual_market_plus_headcount_place_slots"
model_name = "logistic_regression"
feature_columns = [
  "win_odds",
  "place_basis_odds",
  "popularity",
  "headcount",
  "place_slot_count",
]
feature_transforms = ["log1p", "log1p", "identity", "identity", "identity"]

[[comparison.feature_sets]]
name = "dual_market_plus_headcount_place_slots_distance_logreg"
dataset_feature_set = "dual_market_plus_headcount_place_slots_distance"
model_name = "logistic_regression"
feature_columns = [
  "win_odds",
  "place_basis_odds",
  "popularity",
  "headcount",
  "place_slot_count",
  "distance_m",
]
feature_transforms = ["log1p", "log1p", "identity", "identity", "identity", "identity"]
