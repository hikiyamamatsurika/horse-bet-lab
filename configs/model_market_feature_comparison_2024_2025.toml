[comparison]
name = "market_feature_comparison_2024_2025"
duckdb_path = "data/artifacts/jrdb_2024_2025.duckdb"
output_dir = "data/artifacts/market_feature_comparison_2024_2025"
start_date = "2024-01-01"
end_date = "2025-12-31"
target_name = "is_place"
backtest_template_config_path = "configs/place_backtest_edge_oz_place_basis_odds_popularity_1_3_place_basis_band_select_on_aggregate_valid_rollforward_retrain_2024_2025.toml"
aggregate_selection_score_rule = "positive_window_count_then_mean_roi_then_min_roi"

[[comparison.feature_sets]]
name = "current_win_market"
dataset_feature_set = "current_win_market"
feature_columns = ["win_odds", "popularity"]
feature_transforms = ["log1p", "identity"]

[[comparison.feature_sets]]
name = "place_market_only"
dataset_feature_set = "place_market_only"
feature_columns = ["place_basis_odds"]
feature_transforms = ["log1p"]

[[comparison.feature_sets]]
name = "place_market_plus_popularity"
dataset_feature_set = "place_market_plus_popularity"
feature_columns = ["place_basis_odds", "popularity"]
feature_transforms = ["log1p", "identity"]

[[comparison.feature_sets]]
name = "dual_market"
dataset_feature_set = "dual_market"
feature_columns = ["win_odds", "place_basis_odds", "popularity"]
feature_transforms = ["log1p", "log1p", "identity"]
